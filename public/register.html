<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /*for register form*/
    body{
        background: linear-gradient(to right,blue 0%,purple 100%);
    }
    #register_form{
        background-image: url(images/register.jpeg);
        width: 10cm;
        height: 45vh;
        border-radius: 10px;
        position: absolute;
        top: 20%;
        left: 35%;
        box-shadow: 20px 15px rgb(13, 13, 13);
    }
    label{
        font-size: 20px;
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        margin-left: 10px;
    
    }
    input{
        border: 1px solid black;
        border-radius: 5px;
        margin-top: 5px;
        margin-bottom: 15px;
        padding: 10px;
        
    }
    #submitbtn{
        margin: 10px 4cm ;
        background:black;
        color: white;
        padding: 10px;
        border-radius: 20px;
    }
    #submitbtn:hover{
        background: linear-gradient(to left,pink 0%,blue 100%);
        color: black;
        cursor: pointer;
    }
</style>
<body>
    <!--register form-->
    <form id="register_form">
    
        <table>
            <tr>
                <td><label>Name:</label></td>
                <td><input id="name" type="text" placeholder="Enter name"></td>
            </tr>
            <tr>
                <td><label>Roll no:</label></td>
                <td><input id="roll" type="text" placeholder="Ex:248H1A4386"></td>
            </tr>
            <tr>
                <td><label>phone no:</label></td>
                <td><input id="phone" type="text" placeholder="Enter mobile number"></td>
            </tr>
            <tr>
                <td><label>Branch:</label></td>
                <td><select id="branch">
                    <option>CSE-AI 1st Year</option>
                    <option>CSE-AI 2nd Year</option>
                    <option>CSE-AI 3rd Year</option>
                    <option>CSE-AI 4th Year</option>
                    <option>CSE 1st Year</option>
                    <option>CSE 2nd Year</option>
                    <option>CSE 3rd Year</option>
                    <option>CSE 4th Year</option>
                    <option>ECE 1st Year</option>
                    <option>ECE 2nd Year</option>
                    <option>ECE 3rd Year</option>
                    <option>ECE 4th Year</option>
                    <option>EEE 1st Year</option>
                    <option>EEE 2nd Year</option>
                    <option>EEE 3rd Year</option>
                    <option>EEE 4th Year</option>
                    <option>AIDS 1st Year</option>  
                    <option>AIDS 2nd Year</option>  
                    <option>AIDS 3rd Year</option>  
                    <option>AIDS 4th Year</option>  
                </select></td>
            </tr>
            <tr>
                <td><label>participate:</label></td>
                <td><input id="type" type="text" placeholder="like Dance,singing,skit etc.."></td>
            </tr>
        </table>
        <button type="submit" id="submitbtn">submit</button>
    </form> 
    <script src="script.js"></script> 
</body>
</html>
