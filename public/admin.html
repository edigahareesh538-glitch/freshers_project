<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered participants</title>
</head>
<style>
    @media print{
        #downbtn{
            display: none;
        }
        #remove_participator{
            display: none;
        }
        #del_all_data{
            display: none;
    }
    body{
        display: flex;
        flex-direction: row;
    }
    #event_list{
        width: 20cm;

    }
    #remove_participator{
        width: 7cm;
    }
    table{
        width: 19cm;
    }
    #remove_participator input{
        padding: 3px;
        border: 1px solid black;
        border-radius: 5px;
    }
    #remove_participator button{
        color: white;
        background-color: blue;
        border: 1px solid black;
        border-radius: 8px;
    }
    #del_all_data{
        color: white;
        background-color: red;
        border: 1px solid black;
        border-radius: 8px;
        text-align: right;
    }
    #updateForm input{
        margin-left: 10px;
        padding: 4px;
        border: 1px solid black;
        border-radius: 5px;
    }
    #downbtn{
        background: linear-gradient(to right,green 0%,orange 100%);
        border: 1px solid black;
        border-radius: 10px;
        margin-left: 13cm;
    }
</style>
<body>
    <div id="event_list">
    
        <h2>List of all participators</h2>
        <h3>Total Registrations: <span id="totalCount">0</span></h3>
        <button id="del_all_data">Delete all data</button>
        <button id="downbtn" onclick="downloadbtn()">Download List</button>
        <table border="1" id="participantsTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Roll no</th>
                    <th>Branch</th>
                    <th>Phone</th>
                    <th>Type</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div id="remove_participator">
        <input type="text"id="rollInput" placeholder="enter roll no"><button onclick="searchByRoll()">Search</button>
        <p id="removing_num"></p>

    </div>
    <div id="updateForm" style="display:none; margin-top:10px; border: 1px solid black; background:linear-gradient(to right,#e1eec3,#f05053); border-radius: 10px;" >
        <h1>Update Details</h1>
    <input type="text" id="updateName" placeholder="Name"><br><br>
    <input type="text" id="updateBranch" placeholder="Branch"><br><br>
    <input type="text" id="updatePhone" placeholder="Phone"><br><br>
    <input type="text" id="updateType" placeholder="Type"><br><br>
    <button onclick="saveUpdate()" style="padding: 5px; margin: 1cm 2cm; background: black; color: white; border-radius: 5px;">Save</button>
</div>
    <script src="admin.js"></script>
</body>

</html>
