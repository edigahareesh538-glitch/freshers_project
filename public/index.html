<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main page</title>
</head>
<style>
    body{
        background: whitesmoke;
    }
    .mvr{
        background: rgb(255, 255, 255,0.2);
        width: 17cm;
        backdrop-filter: blur(10px);
        border-radius: 10px;
        position: absolute;
        top: 35%;
        left: 10.5cm;
    
        
    }
    .main-page{
        background-image: url(images/mvr.png);
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;
        height: 100vh;
        border: none;
        border-radius: 10px;
        
    }
    .main-page h1{
        text-align: center;
        font-size: 40px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    #Upcom_events{
        margin: 1cm 6.5cm;
        padding: 10px;
        color: white;
        background: blue;
        border: none;
        border-radius: 20px;
    }
    
</style>
<body>
    <div class="main-page">
        <div class="mvr">
            <h1>MVRS college of Engineering & Technology</h1>
            <a href="eventspage.html">
                <button id="Upcom_events">Upcoming Events</button>
            </a>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
